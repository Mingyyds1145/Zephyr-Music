# Cross-compilation config for Windows (mingw-w64).
# Adjust the paths below to match your local mingw-w64 installation.
# On most Linux distros with mingw-w64 installed via package manager,
# the binaries are already on PATH and you can remove the explicit paths.

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
